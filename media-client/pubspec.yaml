name: media_client
description: Mobile media client with media library, sources, tasks and player
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=3.2.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  logger: ^2.6.2
  screen_brightness: ^2.1.7
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  palette_generator: ^0.3.3
  web_socket_channel: ^3.0.1
  media_kit: ^1.2.2
  media_kit_video: ^2.0.0
  media_kit_libs_video: ^1.0.7
  wakelock_plus: ^1.1.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
